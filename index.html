

<!DOCTYPE html>
<html>
<head>

<title>Loja MJ</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.produto{
background:#1c1c1c;
padding:20px;
border-radius:10px;
}

.botao{
background:#00c853;
color:white;
padding:10px 20px;
text-decoration:none;
display:inline-block;
margin-top:10px;
border-radius:5px;
}

</style>

</head>

<body>

<h1>Loja MJ</h1>

<div id="produtos" class="container"></div>

<script>

fetch("produtos.json")
.then(res => res.json())
.then(data => {

const container = document.getElementById("produtos")

data.forEach(p => {

container.innerHTML += `
<div class="produto">

<h2>${p.titulo}</h2>

<p>${p.descricao}</p>

<a class="botao" href="${p.link}" target="_blank">

Comprar

</a>

</div>
`

})

})

</script>

</body>
</html>
